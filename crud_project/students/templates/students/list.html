<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="text-center">Student List</h2>
<a href="/create/" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered table-hover">
<tr>
<th>Name</th><th>Email</th><th>Course</th><th>Actions</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.email }}</td>
<td>{{ s.course }}</td>
<td>
<a href="/update/{{ s.id }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ s.id }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}
</table>

</body>
</html>
